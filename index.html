<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess.com - Create Account</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="https://www.chess.com/bundles/web/favicons/favicon-32x32.png" type="image/png">
</head>
<body class="theme-background">
  <!-- Page 1: Create Account -->
  <div id="page-create" class="page active">
    <div class="security-onboarding-container">
      <header class="security-header">
        <div class="security-back-button-container"></div>
        <div class="security-logo-container">
          <a href="#" class="security-logo" title="Chess.com">Chess.com</a>
        </div>
        <div class="security-login-button-container">
          <a href="#" class="security-login-button">
            <span>Log In</span>
          </a>
        </div>
      </header>

      <main class="security-onboarding-form">
        <div class="registration-component">
          <div class="main-screen-component">
            <h1 class="main-screen-onboarding-title">Create Your Chess.com Account</h1>

            <div class="signup-animation-container">
              <div class="pawn-scene">
                <!-- Diamond floor -->
                <div class="diamond-floor">
                  <div class="diamond-left"></div>
                  <div class="diamond-right"></div>
                </div>
                <!-- Pawn -->
                <svg class="pawn-svg" viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
                  <!-- Ball top -->
                  <circle cx="40" cy="12" r="5" fill="#9bce4a"/>
                  <!-- Head -->
                  <circle cx="40" cy="22" r="11" fill="#81b64c"/>
                  <!-- Highlight on head -->
                  <circle cx="37" cy="19" r="4" fill="#9bce4a" opacity="0.35"/>
                  <!-- Neck -->
                  <rect x="35" y="32" width="10" height="5" rx="2" fill="#6fa040"/>
                  <!-- Collar -->
                  <ellipse cx="40" cy="40" rx="15" ry="5" fill="#81b64c"/>
                  <!-- Body -->
                  <path d="M26 42 Q24 58 20 72 L60 72 Q56 58 54 42 Z" fill="#81b64c"/>
                  <!-- Body shadow -->
                  <path d="M26 42 Q24 58 20 72 L40 72 L40 42 Z" fill="#6fa040" opacity="0.3"/>
                  <!-- Lower rim -->
                  <rect x="16" y="72" width="48" height="7" rx="3" fill="#81b64c"/>
                  <!-- Base -->
                  <rect x="12" y="78" width="56" height="10" rx="4" fill="#81b64c"/>
                  <rect x="12" y="78" width="56" height="10" rx="4" fill="rgba(0,0,0,0.1)"/>
                  <!-- Base bottom highlight -->
                  <rect x="14" y="86" width="52" height="3" rx="1.5" fill="#6fa040" opacity="0.5"/>
                </svg>
              </div>
            </div>

            <button class="cc-button cc-button-primary cc-button-xx-large cc-button-full main-screen-button" id="btn-email" type="button">
              <span>Continue with Email</span>
            </button>

            <div class="main-screen-divider">
              <span class="divider-line"></span>
              <span class="main-screen-or">OR</span>
              <span class="divider-line"></span>
            </div>

            <div class="main-screen-social">
              <a href="#" class="cc-button cc-button-secondary cc-button-x-large cc-button-full">
                <img src="https://www.chess.com/bundles/web/images/color-icons/logo-google.svg" alt="Google" width="24" height="24" class="cc-button-icon">
                <span>Continue with Google</span>
              </a>

              <a href="#" class="cc-button cc-button-secondary cc-button-x-large cc-button-full">
                <svg class="cc-button-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                  <path d="M8.43,23 c-1.7,-0.03,-3,-1.67,-4,-3.17 c-2.67,-4.13,-2.97,-8.97,-1.3,-11.53 c1.17,-1.83,3.07,-2.93,4.83,-2.93 c1.8,0,2.93,1,4.4,1 c1.47,0,2.3,-1,4.43,-1 c1.53,0,3.2,0.87,4.4,2.33 c-3.9,2.17,-3.27,7.67,0.63,9.17 c-0.53,1.2,-0.77,1.73,-1.5,2.8 c-0.93,1.47,-2.33,3.3,-4.0,3.33 c-1.5,0,-1.9,-1,-3.93,-1 c-2.07,0.03,-2.47,1,-3.97,1 Z M11.63,5.53 c-0.2,-1.33,0.4,-2.73,1.13,-3.63 c0.87,-1.07,2.3,-1.8,3.57,-1.9 c0.17,1.4,-0.4,2.77,-1.13,3.73 c-0.83,1,-2.23,1.83,-3.57,1.8 Z"/>
                </svg>
                <span>Continue with Apple</span>
              </a>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Page 2: Email & Password -->
  <div id="page-email" class="page">
    <div class="security-onboarding-container">
      <header class="security-header">
        <div class="security-back-button-container">
          <button class="security-back-button" id="btn-back" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M20.0701 10C21.6701 10 22.0001 10.33 22.0001 11.93V12.06C22.0001 13.66 21.6701 13.99 20.0701 13.99H4.50012V9.99L20.0701 10ZM11.9301 21.13L11.8601 21.2C10.7301 22.33 10.2601 22.33 9.13012 21.2L2.73012 14.83C1.00012 13.06 1.00012 10.93 2.73012 9.16L9.13012 2.79C10.2601 1.66 10.7301 1.66 11.8601 2.79L11.9301 2.86001C13.0601 3.99001 13.0601 4.46001 11.9301 5.59001L5.56012 11.99L11.9301 18.39C13.0601 19.52 13.0601 19.99 11.9301 21.12V21.13Z"/>
            </svg>
          </button>
        </div>
        <div class="security-logo-container">
          <a href="#" class="security-logo" title="Chess.com">Chess.com</a>
        </div>
        <div class="security-login-button-container"></div>
      </header>

      <main class="security-onboarding-form">
        <div class="registration-component">
          <div class="login-info-component">
            <h1 class="login-info-title">Enter Your <span class="highlight-green">Email</span> and a Password</h1>
            <h2 class="login-info-subtitle">This allows you to log in on any device</h2>

            <div class="login-info-form">
              <div class="cc-input-group">
                <div class="cc-input-icon">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                  </svg>
                </div>
                <input type="email" id="email" placeholder="Email" autocomplete="email">
              </div>

              <div class="cc-input-group">
                <div class="cc-input-icon">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                  </svg>
                </div>
                <input type="password" id="password" placeholder="Password" autocomplete="new-password">
                <button class="toggle-password" id="toggle-password" type="button" aria-label="Toggle password visibility">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                  </svg>
                </button>
              </div>

              <button class="cc-button cc-button-primary cc-button-xx-large cc-button-full" id="btn-continue" type="button">
                <span>Continue</span>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
